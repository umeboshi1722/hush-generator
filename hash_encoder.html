<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHA-512 + Base64 エンコーダー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>SHA-512 + Base64 エンコーダー</h1>

  <!-- 入力エリア -->
  <div class="card">
    <div class="card-title">入力</div>
    <label for="inputText">ハッシュ化する文字列</label>
    <input type="password" id="inputText" placeholder="文字列を入力してください" autocomplete="off" />
    <button class="run-btn" onclick="runHash()">実行</button>
  </div>

  <!-- 全体表示 -->
  <div class="card">
    <div class="card-title">エンコード結果（全体）</div>
    <div class="result-label">SHA-512 → Base64</div>
    <div class="result-box empty" id="fullResult">
      <span id="fullText">—</span>
      <button class="copy-btn" id="copyFull" onclick="copyText('fullText', 'copyFull')" title="コピー">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        コピー
      </button>
    </div>
  </div>

  <!-- 先頭N文字 -->
  <div class="card">
    <div class="card-title">先頭切り出し</div>
    <div class="trim-row">
      <label for="trimLen">先頭から</label>
      <input type="number" id="trimLen" min="1" max="999" placeholder="桁数" oninput="updateTrim()" />
      <label>文字を表示</label>
    </div>
    <div class="result-box empty" id="trimResult">
      <span id="trimText">—</span>
      <button class="copy-btn" id="copyTrim" onclick="copyText('trimText', 'copyTrim')" title="コピー">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        コピー
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
