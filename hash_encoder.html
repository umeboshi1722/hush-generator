<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHA-512 + Base64 エンコーダー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #94a3b8;
      margin-bottom: 36px;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 760px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    input[type="password"],
    input[type="number"] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3348;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus,
    input[type="number"]:focus {
      border-color: #6366f1;
    }

    input[type="number"] { width: 140px; }

    .run-btn {
      margin-top: 16px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 10px 32px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .run-btn:hover { background: #4f46e5; }
    .run-btn:active { background: #4338ca; }

    .result-label {
      font-size: 0.82rem;
      color: #64748b;
      margin-bottom: 6px;
    }

    .result-box {
      position: relative;
      background: #0f1117;
      border: 1px solid #2d3348;
      border-radius: 8px;
      padding: 12px 48px 12px 14px;
      min-height: 52px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.82rem;
      color: #a5b4fc;
      word-break: break-all;
      line-height: 1.6;
    }

    .result-box.empty { color: #374151; }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #2d3348;
      border: none;
      border-radius: 6px;
      color: #94a3b8;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s, color 0.15s;
    }

    .copy-btn:hover { background: #6366f1; color: #fff; }
    .copy-btn.copied { background: #10b981; color: #fff; }

    .copy-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    .trim-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .trim-row label { margin-bottom: 0; white-space: nowrap; }

    .divider { margin: 18px 0; border: none; border-top: 1px solid #2d3348; }
  </style>
</head>
<body>
  <h1>SHA-512 + Base64 エンコーダー</h1>

  <!-- 入力エリア -->
  <div class="card">
    <div class="card-title">入力</div>
    <label for="inputText">ハッシュ化する文字列</label>
    <input type="password" id="inputText" placeholder="文字列を入力してください" autocomplete="off" />
    <button class="run-btn" onclick="runHash()">実行</button>
  </div>

  <!-- 全体表示 -->
  <div class="card">
    <div class="card-title">エンコード結果（全体）</div>
    <div class="result-label">SHA-512 → Base64</div>
    <div class="result-box empty" id="fullResult">
      <span id="fullText">—</span>
      <button class="copy-btn" id="copyFull" onclick="copyText('fullText', 'copyFull')" title="コピー">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        コピー
      </button>
    </div>
  </div>

  <!-- 先頭N文字 -->
  <div class="card">
    <div class="card-title">先頭切り出し</div>
    <div class="trim-row">
      <label for="trimLen">先頭から</label>
      <input type="number" id="trimLen" min="1" max="999" placeholder="桁数" oninput="updateTrim()" />
      <label>文字を表示</label>
    </div>
    <div class="result-box empty" id="trimResult">
      <span id="trimText">—</span>
      <button class="copy-btn" id="copyTrim" onclick="copyText('trimText', 'copyTrim')" title="コピー">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        コピー
      </button>
    </div>
  </div>

  <script>
    let currentHash = '';

    async function runHash() {
      const raw = document.getElementById('inputText').value;
      if (raw === '') {
        setResult('', '');
        return;
      }

      const encoded = new TextEncoder().encode(raw);
      const hashBuf = await crypto.subtle.digest('SHA-512', encoded);
      const bytes = new Uint8Array(hashBuf);

      // Uint8Array → Base64
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      const base64 = btoa(binary);

      currentHash = base64;
      setResult(base64, getTrimmed(base64));
    }

    function updateTrim() {
      if (!currentHash) return;
      const trimEl = document.getElementById('trimText');
      const box = document.getElementById('trimResult');
      const trimmed = getTrimmed(currentHash);
      if (trimmed !== null) {
        trimEl.textContent = trimmed;
        box.classList.remove('empty');
      } else {
        trimEl.textContent = '—';
        box.classList.add('empty');
      }
    }

    function getTrimmed(hash) {
      const val = parseInt(document.getElementById('trimLen').value, 10);
      if (!val || val < 1) return null;
      return hash.slice(0, val);
    }

    function setResult(full, trimmed) {
      const fullEl = document.getElementById('fullText');
      const fullBox = document.getElementById('fullResult');
      if (full) {
        fullEl.textContent = full;
        fullBox.classList.remove('empty');
      } else {
        fullEl.textContent = '—';
        fullBox.classList.add('empty');
      }

      const trimEl = document.getElementById('trimText');
      const trimBox = document.getElementById('trimResult');
      if (trimmed !== null && trimmed !== '') {
        trimEl.textContent = trimmed;
        trimBox.classList.remove('empty');
      } else {
        trimEl.textContent = '—';
        trimBox.classList.add('empty');
      }
    }

    function copyText(spanId, btnId) {
      const text = document.getElementById(spanId).textContent;
      if (!text || text === '—') return;

      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById(btnId);
        btn.classList.add('copied');
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          コピー完了`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            コピー`;
        }, 1800);
      });
    }

    // Enterキーでも実行
    document.getElementById('inputText').addEventListener('keydown', e => {
      if (e.key === 'Enter') runHash();
    });
  </script>
</body>
</html>
